<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Synced Metronome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Synced Metronome</h1>
  <div class="version-display" id="versionDisplay">v...</div>
  <div class="version-meta">
    <p>Last Modified: 2026-07-22</p>
    <p>Developer: Hye Sung Moon</p>
  </div>
  <div class="connection-status" id="connectionStatus">
    <span class="connection-dot" id="connectionDot"></span>
    <span id="connectionLabel">Connecting...</span>
  </div>
  <div class="beat-indicators" id="beatDots"></div>

  <div class="card">
    <div id="roleChooser">
      <div class="button-group">
        <button id="btnChooseHost" onclick="setRole('host')">Host<span class="role-desc">Control the session</span></button>
        <button id="btnChooseClient" onclick="setRole('client')">Follow<span class="role-desc">Join and listen</span></button>
      </div>
      <p id="hostTakenMsg" style="display:none; color:#d32f2f; margin-top:0.5rem; font-size:0.9rem;">Host role is currently occupied.</p>
    </div>

    <div id="metronomeControls" style="display:none;">
      <p id="bpmDisplay">120</p>
      <div id="clientVisuals" class="visual-indicators">
        <div class="visual-indicator">
          <div class="time-sig-visual" id="timeSignatureVisual">
            <div class="numerator">4</div>
            <div class="divider"></div>
            <div class="denominator">4</div>
          </div>
        </div>
        <div class="visual-indicator">
          <div class="subdiv-visual" id="subdivisionVisual">
            <!-- Will be filled dynamically -->
          </div>
        </div>
      </div>
      <div id="statusInfo">
        <p id="statusDisplay"></p>
        <p id="latencyDisplay"></p>
      </div>
    </div>

    <div id="hostControls" style="display:none;">
      <div class="settings-grid">
        <div class="form-group">
          <div class="bpm-controls" id="bpmControls" style="display: flex;">
            <div class="bpm-buttons">
              <button onclick="changeBpm(-1)">-</button>
              <input id="bpmValue" value="120">
              <button onclick="changeBpm(1)">+</button>
            </div>
            <input type="range" id="bpmSlider" min="30" max="300" value="120">
            <div class="button-group" style="margin-top: 1rem;">
              <button id="startButton" onclick="startMetronome()">Start</button>
              <button id="stopButton" class="stop" onclick="stopMetronome()" disabled>Stop</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label for="timeSigInput">Time Signature:</label>
          <select id="timeSigInput">
            <option value="4/4">4/4</option>
            <option value="3/4">3/4</option>
            <option value="6/8">6/8</option>
          </select>
        </div>
        <div class="form-group">
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <label for="subdivisionInput" style="margin:0;">Subdivision:</label>
            <div id="hostSubdivisionVisual" style="height: 38px;"></div>
          </div>
          <select id="subdivisionInput" style="margin-top: 0.5rem;">
            <option value="1">Quarter Note (1/4)</option>
            <option value="2" selected>Eighth Note (1/8)</option>
            <option value="3">Eighth Note Triplets</option>
            <option value="4">Sixteenth Note (1/16)</option>
          </select>
        </div>
      </div>
      <div id="presetBank">
        <h3>Preset Bank</h3>
        <button onclick="handleSavePreset()">Save Current Preset</button>
        <ul id="presetList"></ul>
      </div>
    </div>
  </div>
</body>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>

<script>
  const socket = io();
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Metronome state
  let bpm = 120;
  let isRunning = false;
  let startTime = null;
  let nextTick = 0;
  let role = null;
  let tickTimer = null;
  let subdivision = 2;
  let timeSignature = '4/4';
  let beatCount = 0;
  let syncTimeout = null;
  let timeSynced = false;
  let isSyncing = false;
  let lastDriftCheck = 0;
  let reSyncInterval = null;

  // DOM Elements
  const metronomeControls = document.getElementById('metronomeControls');
  const roleChooser = document.getElementById('roleChooser');
  const bpmControls = document.getElementById('bpmControls');
  const bpmSlider = document.getElementById('bpmSlider');
  const bpmInput = document.getElementById('bpmValue');
  const startButton = document.getElementById('startButton');
  const stopButton = document.getElementById('stopButton');
  const clientVisuals = document.getElementById('clientVisuals');
  const noSleep = new NoSleep();
  const btnChooseHost = document.getElementById('btnChooseHost');
  const hostTakenMsg = document.getElementById('hostTakenMsg');

  // Fetch and display version from server
  fetch('/version')
    .then(res => res.json())
    .then(data => {
      document.getElementById('versionDisplay').textContent = `v${data.version}`;
    })
    .catch(err => console.error('Failed to fetch version:', err));

  // Slider fill logic
  function updateSliderFill(slider) {
    const min = +slider.min || 0;
    const max = +slider.max || 100;
    const val = +slider.value;
    const percent = ((val - min) / (max - min)) * 100;
    slider.style.setProperty('--val', percent + '%');
  }
  // Init and update slider fill on input/change

  if (bpmSlider) {
    updateSliderFill(bpmSlider);
    bpmSlider.addEventListener('input', () => updateSliderFill(bpmSlider));
    bpmSlider.addEventListener('change', () => updateSliderFill(bpmSlider));
  }

  // Update BPM value display when slider changes
  bpmSlider.addEventListener('input', () => {
    bpm = parseInt(bpmSlider.value);
    bpmInput.value = bpm;
    document.getElementById("bpmDisplay").textContent = `${bpm}`;
    updateSliderFill(bpmSlider);
    if (role === 'host') {
      debounceUpdateSettings();
      renderPresets();
    }
  });

  // Handle direct BPM input changes
  bpmInput.addEventListener('change', () => {
    let newBpm = parseInt(bpmInput.value);
    // Clamp BPM to valid range
    newBpm = Math.max(30, Math.min(300, newBpm || 120));
    bpm = newBpm;
    bpmInput.value = bpm;
    bpmSlider.value = bpm;
    updateSliderFill(bpmSlider);
    document.getElementById("bpmDisplay").textContent = `${bpm}`;
    if (role === 'host') {
      updateSettings();
    }
  });

  let wakeLock = null;
  let silentSource = null;

  async function requestWakeLock() {
    // Release existing lock before re-acquiring
    if (wakeLock) {
      try { await wakeLock.release(); } catch (e) { /* ignore */ }
      wakeLock = null;
    }
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
        console.log('Wake Lock active');
      }
    } catch (err) {
      console.error(`Wake Lock failed: ${err.name}, ${err.message}`);
    }
  }

  async function releaseWakeLock() {
    if (wakeLock) {
      try { await wakeLock.release(); } catch (e) { /* ignore */ }
      wakeLock = null;
      console.log('Wake Lock released');
    }
  }

  function startSilentAudio() {
    if (silentSource) return;
    try {
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
      silentSource = audioCtx.createBufferSource();
      silentSource.buffer = buffer;
      silentSource.loop = true;
      silentSource.connect(audioCtx.destination);
      silentSource.start();
    } catch (e) {
      console.error("Error starting silent audio:", e);
    }
  }

  function stopSilentAudio() {
    if (silentSource) {
      try { silentSource.stop(); } catch (e) { /* ignore */ }
      silentSource = null;
    }
  }

  // Acquire all screen-wake mechanisms (called when playback starts)
  function acquireScreenWake() {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().catch(e => console.error("AudioContext resume error:", e));
    }
    startSilentAudio();
    requestWakeLock();
    if (!noSleep.isEnabled) {
      noSleep.enable().catch(e => console.error("Failed to enable NoSleep:", e));
    }
  }

  // Release all screen-wake mechanisms (called when playback stops)
  function releaseScreenWake() {
    stopSilentAudio();
    releaseWakeLock();
    if (noSleep.isEnabled) {
      noSleep.disable();
    }
  }

  // Resume AudioContext on first user interaction
  document.body.addEventListener('click', () => {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }, { once: true });

  // Update time signature visual display
  function updateTimeSignatureVisual(ts) {
    const [numerator, denominator] = ts.split('/').map(Number);
    const visual = document.getElementById('timeSignatureVisual');
    const numeratorEl = visual.querySelector('.numerator');
    const denominatorEl = visual.querySelector('.denominator');
    numeratorEl.textContent = numerator;
    denominatorEl.textContent = denominator;
  }

  // Update subdivision visual display
  function updateSubdivisionVisual(subdiv) {
    subdiv = parseInt(subdiv);
    
    // Update both client and host visuals
    const targets = [
      document.getElementById('subdivisionVisual'),
      document.getElementById('hostSubdivisionVisual')
    ];

    targets.forEach(container => {
      if (!container) return;
      container.innerHTML = '';
      
      const img = document.createElement('img');
      img.className = 'note-icon';
      
      switch (subdiv) {
        case 1:
          img.src = 'icons/quarter.svg';
          img.alt = 'Quarter Note';
          break;
        case 2:
          img.src = 'icons/eighth.svg';
          img.alt = 'Eighth Notes';
          break;
        case 3:
          img.src = 'icons/triplet.svg';
          img.alt = 'Triplets';
          break;
        case 4:
          img.src = 'icons/sixteenth.svg';
          img.alt = 'Sixteenth Notes';
          break;
        default:
          console.warn('Unknown subdivision:', subdiv);
          return;
      }
      container.appendChild(img);
    });
  }

  // Create visual beat indicators based on time signature
  function updateBeatDots() {
    const container = document.getElementById('beatDots');
    container.innerHTML = '';
    const [numerator, denominator] = timeSignature.split('/').map(Number);
    for (let i = 0; i < numerator; i++) {
      const dot = document.createElement('div');
      dot.classList.add('dot');
      if (i === 0) {
        dot.classList.add('accent');
      }
      container.appendChild(dot);
    }
  }

  // Highlight the current beat dot
  function highlightDot(index) {
    const dots = document.querySelectorAll('.dot');
    dots.forEach((dot, i) => {
      dot.classList.toggle('active', i === index);
    });
  }

  // Flash the screen
  function flashScreen(isAccent) {
    const flashClass = isAccent ? 'flash-accent' : 'flash';
    document.body.classList.add(flashClass);
    setTimeout(() => {
      document.body.classList.remove(flashClass);
    }, 50);
  }

  // Change BPM value
  function changeBpm(delta) {
    bpm = Math.max(30, Math.min(300, bpm + delta));
    bpmSlider.value = bpm;
    bpmInput.value = bpm;
    updateSliderFill(bpmSlider);
    document.getElementById("bpmDisplay").textContent = `${bpm}`;
    if (role === 'host') {
      updateSettings();
    }
  }

  // Debounce function for slider changes
  let updateTimeout = null;
  function debounceUpdateSettings() {
    clearTimeout(updateTimeout);
    updateTimeout = setTimeout(updateSettings, 300);
  }

  // ---------------------------------------------------------------------------
  // Disciplined clock
  //
  // We model the mapping from the local clock to the server clock as a line:
  //   serverTime ≈ localTime + intercept + slope * (localTime - refLocal)
  // `intercept` corrects the constant offset; `slope` corrects the *rate*
  // difference (clock skew) so we stop chasing drift between syncs. Samples
  // come from a 4-timestamp round-trip and are weighted by measured network
  // delay — high-delay (asymmetric/jittery) samples are discarded.
  // ---------------------------------------------------------------------------
  const MAX_CLOCK_SAMPLES = 60;
  let clockSamples = [];       // { local, server, delay }
  let clockRefLocal = null;    // fixed anchor (first sample's local time)
  let clockIntercept = 0;      // (server - local) at refLocal, in ms
  let clockSlope = 0;          // change in (server - local) per ms of local time

  function addClockSample(local, server, delay) {
    if (clockRefLocal === null) clockRefLocal = local;
    clockSamples.push({ local, server, delay });
    if (clockSamples.length > MAX_CLOCK_SAMPLES) clockSamples.shift();
    recomputeClock();
  }

  function recomputeClock() {
    if (clockSamples.length === 0) return;
    // Keep the lowest-delay half of samples (min 4) — closest to symmetric.
    const sorted = [...clockSamples].sort((a, b) => a.delay - b.delay);
    const keep = sorted.slice(0, Math.max(4, Math.ceil(sorted.length / 2)));
    const n = keep.length;

    const xs = keep.map(s => s.local - clockRefLocal);   // local time since anchor
    const ys = keep.map(s => s.server - s.local);        // offset at that time
    const meanX = xs.reduce((a, b) => a + b, 0) / n;
    const meanY = ys.reduce((a, b) => a + b, 0) / n;

    let num = 0, den = 0;
    for (let i = 0; i < n; i++) {
      num += (xs[i] - meanX) * (ys[i] - meanY);
      den += (xs[i] - meanX) ** 2;
    }
    const span = Math.max(...xs) - Math.min(...xs);

    // Only trust a skew estimate once samples span enough wall-clock time and
    // we have enough of them; otherwise a short burst would fit noise as slope.
    if (den > 0 && span > 20000 && n >= 8) {
      clockSlope = Math.max(-5e-4, Math.min(5e-4, num / den)); // clamp to ±500ppm
      clockIntercept = meanY - clockSlope * meanX;
    } else {
      clockSlope = 0;
      clockIntercept = meanY;
    }
    timeSynced = true;
  }

  // One round-trip. Resolves to a sample, or null on timeout/failure.
  function pingServerTime(timeoutMs = 3000) {
    return new Promise((resolve) => {
      const t0 = Date.now();
      let done = false;
      const timer = setTimeout(() => { if (!done) { done = true; resolve(null); } }, timeoutMs);
      socket.emit('timeSync', { t0 }, (resp) => {
        if (done) return;
        done = true;
        clearTimeout(timer);
        const t3 = Date.now();
        if (!resp || typeof resp.t1 !== 'number' || typeof resp.t2 !== 'number') {
          return resolve(null);
        }
        // NTP: offset = ((t1 - t0) + (t2 - t3)) / 2, delay = (t3 - t0) - (t2 - t1)
        const offset = ((resp.t1 - t0) + (resp.t2 - t3)) / 2;
        const delay = (t3 - t0) - (resp.t2 - resp.t1);
        const localMid = (t0 + t3) / 2;
        resolve({ local: localMid, server: localMid + offset, delay: Math.max(0, delay) });
      });
    });
  }

  // Collect a burst of samples and fold them into the disciplined clock.
  async function syncTime(silent = false) {
    if (isSyncing) return timeSynced;
    isSyncing = true;
    if (!silent) {
      document.getElementById('latencyDisplay').textContent = 'Syncing with server...';
    }
    try {
      const burst = timeSynced ? 6 : 16; // fewer probes on periodic re-sync
      let good = 0;
      for (let i = 0; i < burst; i++) {
        const s = await pingServerTime();
        if (s) { addClockSample(s.local, s.server, s.delay); good++; }
        await new Promise(r => setTimeout(r, 40 + Math.random() * 40));
      }

      if (good === 0) {
        if (!silent && !timeSynced) {
          document.getElementById('latencyDisplay').textContent = 'Time sync failed. Please refresh.';
        }
        return timeSynced;
      }

      const oneWay = Math.round(Math.min(...clockSamples.map(s => s.delay)) / 2);
      if (!silent) {
        document.getElementById('latencyDisplay').textContent =
          `Sync ~${Math.max(0, oneWay)}ms${clockSlope ? ' · drift-corrected' : ''}`;
      }
      console.log('Sync complete. intercept:', Math.round(clockIntercept),
        'ms, slope:', clockSlope.toExponential(2), 'best one-way:', oneWay, 'ms');
      return true;
    } catch (error) {
      console.error('Failed to sync time:', error);
      if (!silent && !timeSynced) {
        document.getElementById('latencyDisplay').textContent = 'Time sync failed. Please refresh.';
      }
      return timeSynced;
    } finally {
      isSyncing = false;
    }
  }

  function globalNow() {
    if (clockRefLocal === null) return Date.now();
    const now = Date.now();
    return now + clockIntercept + clockSlope * (now - clockRefLocal);
  }

  // Pre-build noise buffers to avoid per-tick allocations
  const clickBuffers = { normal: null, accent: null };
  function buildClickBuffers() {
    const normalLen = 0.05;
    const accentLen = 0.08;
    const normalBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * normalLen, audioCtx.sampleRate);
    const normalData = normalBuf.getChannelData(0);
    for (let i = 0; i < normalData.length; i++) {
      normalData[i] = (Math.random() * 2 - 1) * Math.exp(-i / 200);
    }
    const accentBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * accentLen, audioCtx.sampleRate);
    const accentData = accentBuf.getChannelData(0);
    for (let i = 0; i < accentData.length; i++) {
      accentData[i] = (Math.random() * 2 - 1) * Math.exp(-i / 140);
    }
    clickBuffers.normal = normalBuf;
    clickBuffers.accent = accentBuf;
  }
  buildClickBuffers();

  function scheduleClick(time, isAccent = false) {
    const noiseLength = isAccent ? 0.08 : 0.05;
    const buffer = isAccent ? clickBuffers.accent : clickBuffers.normal;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(isAccent ? 2.0 : 1.0, time);
    gain.gain.linearRampToValueAtTime(0.001, time + noiseLength);
    noise.connect(gain).connect(audioCtx.destination);
    noise.start(time);
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = isAccent ? 'square' : 'triangle';
    osc.frequency.setValueAtTime(isAccent ? 1500 : 1000, time);
    oscGain.gain.setValueAtTime(isAccent ? 10.0 : 5.0, time);
    oscGain.gain.linearRampToValueAtTime(0.001, time + (isAccent ? 0.09 : 0.05));
    osc.connect(oscGain).connect(audioCtx.destination);
    osc.start(time);
    osc.stop(time + (isAccent ? 0.09 : 0.05));
  }

  function tickLoop() {
    if (!isRunning) return;
    try {
      const interval = (60 / bpm) / subdivision;
      const now = audioCtx.currentTime;
      const [numerator, denominator] = timeSignature.split('/').map(Number);
      const ticksPerBar = numerator * subdivision;

      // Re-anchor timing to the server clock every ~2s. This corrects drift
      // between audioCtx.currentTime (audio hardware clock) and the disciplined
      // server clock. Host and clients both anchor to the server so they stay
      // mutually aligned (the host is NOT a self-referential anchor).
      if (now - lastDriftCheck > 2.0 && startTime && timeSynced) {
        lastDriftCheck = now;
        const serverNow = globalNow();
        const intervalMs = (60000 / bpm) / subdivision;
        const elapsedMs = serverNow - startTime;
        const expectedBeat = Math.floor(elapsedMs / intervalMs);
        const expectedNextTickMs = startTime + (expectedBeat + 1) * intervalMs;
        const hardwareLatency = (audioCtx.outputLatency || 0) + (audioCtx.baseLatency || 0);
        const expectedNextTickAudio = now + (expectedNextTickMs - serverNow) / 1000 - hardwareLatency;
        const drift = nextTick - expectedNextTickAudio;
        if (Math.abs(drift) > 0.05) {
          // Large drift (tab was throttled / audio glitch): hard re-anchor.
          console.log(`Hard re-anchor: ${(drift * 1000).toFixed(1)}ms`);
          nextTick = expectedNextTickAudio;
          beatCount = expectedBeat + 1;
        } else if (Math.abs(drift) > 0.002) {
          // Small drift: slew gently toward target to avoid an audible jump.
          nextTick -= drift * 0.3;
        }
      }

      while (nextTick < now + 0.3) {
        const currentBeat = Math.floor(beatCount / subdivision);
        const isFirstBeat = (beatCount % ticksPerBar === 0);
        const isMainBeat = (beatCount % subdivision === 0);
        scheduleClick(nextTick, isFirstBeat);
        if (isMainBeat) {
          const visualBeat = currentBeat % numerator;
          requestAnimationFrame(() => {
            highlightDot(visualBeat);
            flashScreen(isFirstBeat);
          });
        }
        nextTick += interval;
        beatCount++;
      }
      tickTimer = setTimeout(tickLoop, 25);
    } catch (error) {
      console.error('Error in tick loop:', error);
      if (isRunning) {
        tickTimer = setTimeout(() => {
          if (isRunning) tickLoop();
        }, 1000);
      }
    }
  }

  function syncClock(data) {
    bpm = data.bpm;
    subdivision = data.subdivision || 1;
    timeSignature = data.timeSignature || '4/4';
    bpmInput.value = bpm;
    bpmSlider.value = bpm;
    updateSliderFill(bpmSlider);
    document.getElementById("bpmDisplay").textContent = `${bpm}`;
    updateTimeSignatureVisual(timeSignature);
    updateSubdivisionVisual(subdivision);
    updateBeatDots();
    const wasRunning = isRunning;
    isRunning = data.isRunning;
    document.body.classList.toggle('playing', isRunning);
    if (role === 'host') {
      startButton.disabled = isRunning;
      stopButton.disabled = !isRunning;
    }
    if (!isRunning && wasRunning) {
      if (tickTimer) {
        clearTimeout(tickTimer);
        tickTimer = null;
      }
      if (syncTimeout) {
        clearTimeout(syncTimeout);
        syncTimeout = null;
      }
      document.querySelectorAll('.dot').forEach(dot => dot.classList.remove('active'));
      releaseScreenWake();
      return;
    }
    if (isRunning && data.startTime) {
      if (wasRunning && tickTimer) {
        clearTimeout(tickTimer);
        tickTimer = null;
      }
      if (!timeSynced) return;
      acquireScreenWake();
      startTime = data.startTime;
      startMetronomeSync();
    }
  }

  function startMetronomeSync() {
    if (syncTimeout) {
      clearTimeout(syncTimeout);
      syncTimeout = null;
    }
    try {
      audioCtx.resume().then(() => {
        const now = globalNow();
        const intervalMs = (60000 / bpm) / subdivision;
        const elapsedMs = now - startTime;
        const ticksSinceStart = Math.floor(elapsedMs / intervalMs);
        const nextTickTimeMs = startTime + (ticksSinceStart + 1) * intervalMs;
        const delayMs = nextTickTimeMs - now;
        
        // Calculate the precise AudioContext time for the next tick
        // We map the target Server Time to AudioContext time
        // Relation: AudioTime = CurrentAudioTime + (TargetServerTime - CurrentServerTime)
        // Note: dividing by 1000 because audioCtx uses seconds
        const delaySec = delayMs / 1000;
        
        // Compensate for Output Latency if available (experimental feature)
        // audioCtx.outputLatency is the time from processing to sound output
        // We subtract it to schedule the sound earlier so it *arrives* on time
        const hardwareLatency = (audioCtx.outputLatency || 0) + (audioCtx.baseLatency || 0);
        
        // Set nextTick anchor based on the math, not "now"
        nextTick = audioCtx.currentTime + delaySec - hardwareLatency;
        lastDriftCheck = audioCtx.currentTime;
        
        const clampedDelay = Math.max(0, Math.min(1000, delayMs));
        
        syncTimeout = setTimeout(() => {
          syncTimeout = null;
          // Don't reset nextTick here! It's already set precisely above.
          // Just update the beat count
          beatCount = ticksSinceStart + 1;
          tickLoop();
        }, clampedDelay);
      }).catch(err => {
        console.error('Audio context resume error:', err);
      });
    } catch (error) {
      console.error('Error starting metronome:', error);
    }
  }

  socket.on('sync', syncClock);

  // Handle tab visibility changes
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      // Re-acquire wake lock (it releases when tab goes to background)
      if (isRunning) {
        requestWakeLock();
      }
      // Host and clients both re-sync on tab visibility — both anchor to server
      if (isRunning && startTime && timeSynced) {
        syncTime(true).then(() => {
          if (isRunning && startTime) {
            if (tickTimer) {
              clearTimeout(tickTimer);
              tickTimer = null;
            }
            startMetronomeSync();
          }
        });
      }
    }
  });

  function startPeriodicReSync() {
    // Host and clients both re-sync periodically so the disciplined clock can
    // refine its skew estimate and keep everyone locked to the server clock.
    stopPeriodicReSync();
    reSyncInterval = setInterval(() => {
      if (timeSynced) syncTime(true);
    }, 30000);
  }

  function stopPeriodicReSync() {
    if (reSyncInterval) {
      clearInterval(reSyncInterval);
      reSyncInterval = null;
    }
  }

  socket.on('clientCount', (count) => {
    const otherCount = count - 1;
    document.getElementById("statusDisplay").textContent = otherCount === 1
      ? `1 other device connected`
      : `${otherCount} other devices connected`;
  });

  // Connection status indicator
  function updateConnectionStatus(connected) {
    const dot = document.getElementById('connectionDot');
    const label = document.getElementById('connectionLabel');
    dot.className = 'connection-dot ' + (connected ? 'connected' : 'disconnected');
    label.textContent = connected ? 'Connected' : 'Reconnecting...';
  }

  // Re-identify role and re-sync on socket reconnection
  socket.on('connect', () => {
    updateConnectionStatus(true);
    if (role) {
      socket.emit('identify', role);
      // Re-sync on reconnect for both roles — the socket (and thus the sync
      // round-trip path) is new, so refresh the clock estimate.
      syncTime(true);
    }
  });

  socket.on('disconnect', () => {
    updateConnectionStatus(false);
  });

  socket.on('hostAvailability', (isAvailable) => {
    if (role) return; // Only update if still in role selection screen
    
    if (isAvailable) {
      btnChooseHost.disabled = false;
      btnChooseHost.innerHTML = 'Host<span class="role-desc">Control the session</span>';
      btnChooseHost.title = "";
      hostTakenMsg.style.display = 'none';
    } else {
      btnChooseHost.disabled = true;
      btnChooseHost.innerHTML = 'Host (Occupied)<span class="role-desc">Another user is hosting</span>';
      btnChooseHost.title = "Another user is already the host";
      hostTakenMsg.style.display = 'block';
    }
  });

  function updateSettings() {
    if (role !== 'host') return;
    const ts = document.getElementById("timeSigInput").value;
    const subdiv = parseInt(document.getElementById("subdivisionInput").value);
    updateTimeSignatureVisual(ts);
    updateSubdivisionVisual(subdiv);
    updateBeatDots();
    
    const payload = {
      bpm,
      timeSignature: ts,
      subdivision: subdiv
    };

    if (isRunning) {
      const delayMs = (nextTick - audioCtx.currentTime) * 1000;
      const nextBeatTime = globalNow() + delayMs;
      const newInterval = (60000 / bpm) / subdiv;
      payload.startTime = nextBeatTime - (beatCount * newInterval);
    }

    socket.emit('updateSettings', payload);
  }

  document.getElementById("timeSigInput").addEventListener('change', function () {
    updateTimeSignatureVisual(this.value);
    updateSettings();
  });

  document.getElementById("subdivisionInput").addEventListener('change', function () {
    updateSubdivisionVisual(parseInt(this.value));
    updateSettings();
  });

  function startMetronome() {
    if (role !== 'host') return;
    acquireScreenWake();
    startButton.disabled = true;
    socket.emit('startMetronome');
  }

  function stopMetronome() {
    if (role !== 'host') return;
    isRunning = false;
    stopButton.disabled = true;
    if (tickTimer) {
      clearTimeout(tickTimer);
      tickTimer = null;
    }
    document.querySelectorAll('.dot').forEach(dot => dot.classList.remove('active'));
    releaseScreenWake();
    socket.emit('stopMetronome');
  }

  function setRole(r) {
    role = r;
    roleChooser.style.display = 'none';
    metronomeControls.style.display = 'block';
    const isHost = r === 'host';
    document.getElementById("hostControls").style.display = isHost ? 'block' : 'none';
    clientVisuals.style.display = isHost ? 'none' : 'flex';
    document.getElementById("bpmDisplay").style.display = isHost ? 'none' : 'block';
    document.getElementById("statusInfo").style.display = isHost ? 'none' : 'block';
    updateBeatDots();
    updateTimeSignatureVisual(timeSignature);
    updateSubdivisionVisual(subdivision);
    syncTime().then((success) => {
      if (success) {
        socket.emit('identify', r);
        startPeriodicReSync();
      }
    });
  }

  function getPresets() {
    return JSON.parse(localStorage.getItem('metronomePresets') || '[]');
  }

  function savePreset(preset) {
    const presets = getPresets();
    presets.push(preset);
    localStorage.setItem('metronomePresets', JSON.stringify(presets));
  }

  function deletePreset(index) {
    const presets = getPresets();
    presets.splice(index, 1);
    localStorage.setItem('metronomePresets', JSON.stringify(presets));
  }

  function handleSavePreset() {
    const ts = document.getElementById("timeSigInput").value;
    const subdiv = parseInt(document.getElementById("subdivisionInput").value);
    const name = `${bpm} BPM, ${ts}, Sub: ${subdiv}`;
    const preset = {
      name,
      bpm,
      timeSignature: ts,
      subdivision: subdiv,
    };
    savePreset(preset);
    renderPresets();
  }

  function handleLoadPreset(idx) {
    const preset = getPresets()[idx];
    if (preset) {
      bpm = preset.bpm;
      document.getElementById("bpmSlider").value = bpm;
      document.getElementById("bpmValue").value = bpm;
      updateSliderFill(bpmSlider);
      document.getElementById("bpmDisplay").textContent = `${bpm}`;
      document.getElementById("timeSigInput").value = preset.timeSignature;
      document.getElementById("subdivisionInput").value = preset.subdivision;
      updateTimeSignatureVisual(preset.timeSignature);
      updateSubdivisionVisual(preset.subdivision);
      updateSettings();
    }
  }

  function handleDeletePreset(idx) {
    deletePreset(idx);
    renderPresets();
  }

  function renderPresets() {
    const list = document.getElementById('presetList');
    list.innerHTML = '';
    const presets = getPresets();
    presets.forEach((preset, i) => {
      const li = document.createElement('li');
      li.innerHTML = `
      <span style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
        ${preset.bpm} BPM ${preset.timeSignature}, ${subdivisionToText(preset.subdivision)}
      </span>
      <button class="preset-btn" onclick="handleLoadPreset(${i})">load</button>
      <button class="preset-btn" onclick="handleDeletePreset(${i})">delete</button>
    `;
      list.appendChild(li);
    });
  }

  function subdivisionToText(subdivision) {
    switch (subdivision) {
      case 1: return 'quarter';
      case 2: return 'eighth';
      case 3: return 'triplet';
      case 4: return 'sixteenth';
      default: return 'custom';
    }
  }
</script>

</html>
